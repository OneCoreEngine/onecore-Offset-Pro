<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
    <style>
        body { background: #0a0a0a; color: #39ff14; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .loader { border: 3px solid rgba(57, 255, 20, 0.1); border-top: 3px solid #39ff14; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (code) {
            const codeVerifier = sessionStorage.getItem('gh_code_verifier');
            
            // Exchange code for token directly from browser (Note: This may hit CORS issues if GitHub doesn't allow it)
            const formData = new FormData();
            formData.append('client_id', 'Ov231i4bnJffZb9RGhUK');
            formData.append('code', code);
            formData.append('code_verifier', codeVerifier);
            formData.append('grant_type', 'authorization_code');
            formData.append('redirect_uri', window.location.origin + '/callback.html');

            fetch('https://github.com/login/oauth/access_token', {
                method: 'POST',
                headers: { 'Accept': 'application/json' },
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.access_token) {
                    window.opener.postMessage({ access_token: data.access_token }, window.location.origin);
                    window.close();
                } else {
                    window.opener.postMessage({ error: data.error_description || 'Failed to exchange token' }, window.location.origin);
                    window.close();
                }
            })
            .catch(err => {
                console.error(err);
                window.opener.postMessage({ error: 'CORS or Network error during token exchange. GitHub does not support direct browser-to-token-endpoint calls without a proxy.' }, window.location.origin);
                window.close();
            });
        } else if (error) {
            window.opener.postMessage({ error: urlParams.get('error_description') || 'Authorization failed' }, window.location.origin);
            window.close();
        } else {
            window.close();
        }
    </script>
</body>
</html>
