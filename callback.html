<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body {
            background: #05040a;
            color: #c4b5fd;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
        }
        .loader {
            border: 4px solid rgba(196, 181, 253, 0.1);
            border-top: 4px solid #c4b5fd;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>Exchanging code for token...</p>

    <script>
        (async function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const code_verifier = sessionStorage.getItem('gh_code_verifier');

            if (!code) {
                window.opener.postMessage({ error: 'No code received from GitHub' }, window.location.origin);
                window.close();
                return;
            }

            try {
                const response = await fetch('/api/exchange', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, code_verifier })
                });

                const data = await response.json();

                if (data.access_token) {
                    window.opener.postMessage({ access_token: data.access_token }, window.location.origin);
                } else {
                    window.opener.postMessage({ error: data.error || 'Failed to exchange token' }, window.location.origin);
                }
            } catch (err) {
                window.opener.postMessage({ error: err.message }, window.location.origin);
            } finally {
                window.close();
            }
        })();
    </script>
</body>
</html>
