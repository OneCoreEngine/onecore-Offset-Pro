<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
    <style>
        body { background: #0a0a0a; color: #39ff14; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; margin: 0; }
        .loader { border: 3px solid rgba(57, 255, 20, 0.1); border-top: 3px solid #39ff14; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .text { font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <div class="text">Exchanging Code...</div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');

        if (code) {
            const codeVerifier = sessionStorage.getItem('gh_code_verifier');
            const client_id = 'Ov231i4bnJffZb9RGhUK';
            
            // Exchange code for token directly from browser
            // GitHub supports CORS for PKCE apps without a secret
            fetch('https://github.com/login/oauth/access_token', {
                method: 'POST',
                headers: { 
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    client_id: client_id,
                    code: code,
                    code_verifier: codeVerifier,
                    grant_type: 'authorization_code',
                    redirect_uri: window.location.origin + '/callback.html'
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.access_token) {
                    window.opener.postMessage({ token: data.access_token }, window.location.origin);
                    window.close();
                } else {
                    window.opener.postMessage({ error: data.error_description || 'Failed to exchange token' }, window.location.origin);
                    window.close();
                }
            })
            .catch(err => {
                console.error('Token exchange error:', err);
                window.opener.postMessage({ error: 'Network error during token exchange. Ensure your GitHub App is configured for PKCE.' }, window.location.origin);
                window.close();
            });
        } else if (error) {
            window.opener.postMessage({ error: urlParams.get('error_description') || 'Authorization failed' }, window.location.origin);
            window.close();
        } else {
            window.close();
        }
    </script>
</body>
</html>
