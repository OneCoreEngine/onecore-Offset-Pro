<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OneCore GitHub File Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05040a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-deep: #05040a;
            --bg-card: #0f0a1f;
            --text-main: #c4b5fd;
            --accent: #8b5cf6;
            --accent-glow: rgba(139, 92, 246, 0.3);
        }
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: var(--bg-card);
            border: 1px solid rgba(196, 181, 253, 0.1);
        }
        .nav-item.active {
            color: white;
        }
        .nav-item.active i {
            transform: translateY(-2px);
            text-shadow: 0 0 15px var(--accent);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loader {
            border: 3px solid rgba(196, 181, 253, 0.1);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .btn-primary {
            background-color: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px var(--accent-glow);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#05040a] flex flex-col items-center justify-center p-6 text-center">
        <div class="mb-10">
            <div class="w-24 h-24 bg-violet-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(139,92,246,0.4)]">
                <i class="fab fa-github text-5xl text-white"></i>
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">OneCore <span class="text-violet-400">GitHub</span></h1>
            <p class="text-violet-300/60 mt-2 text-sm font-bold uppercase tracking-widest">File Manager Pro</p>
        </div>

        <div id="login-initial" class="w-full max-w-xs space-y-4">
            <button id="btn-login" class="w-full btn-primary font-black py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-sm">
                <i class="fab fa-github"></i>
                Login with GitHub
            </button>
            <p class="text-[10px] text-violet-300/40 font-bold uppercase tracking-tighter">Uses secure PKCE authentication</p>
        </div>

        <div id="login-loading" class="w-full max-w-xs hidden">
            <div class="loader mx-auto mb-4"></div>
            <p class="text-xs text-violet-300/60 font-bold uppercase tracking-widest">Authenticating via popup...</p>
        </div>
    </div>

    <!-- Main App Container -->
    <main id="app-container" class="flex-1 overflow-y-auto no-scrollbar pb-24 hidden">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-[#05040a]/80 backdrop-blur-md border-b border-violet-900/20 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-9 h-9 rounded-xl bg-violet-900/20 border border-violet-500/20 overflow-hidden">
                    <img src="" alt="" class="w-full h-full object-cover hidden">
                </div>
                <h2 id="view-title" class="text-lg font-black text-white uppercase tracking-tight">Home</h2>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-refresh" class="p-2 text-violet-300/40 hover:text-white transition-colors"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content" class="p-4 space-y-4">
            <!-- Content will be injected here -->
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 glass-card border-t border-violet-900/30 safe-bottom z-50 hidden">
        <div class="flex items-center justify-around p-2">
            <button data-tab="home" class="nav-item flex flex-col items-center gap-1 p-2 transition-all active">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
            </button>
            <button data-tab="repos" class="nav-item flex flex-col items-center gap-1 p-2 transition-all">
                <i class="fas fa-book text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Repos</span>
            </button>
            <button data-tab="upload" class="nav-item flex flex-col items-center gap-1 p-2 transition-all">
                <i class="fas fa-cloud-upload-alt text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Upload</span>
            </button>
            <button data-tab="settings" class="nav-item flex flex-col items-center gap-1 p-2 transition-all">
                <i class="fas fa-cog text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Settings</span>
            </button>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-violet-600 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[200]">
        Notification message
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
