<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OneCore GitHub Manager</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1033">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff66;
            --dark-bg: #050505;
            --card-bg: #111111;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-glow: rgba(0, 255, 102, 0.3);
        }
        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: var(--card-bg);
            border: 1px solid rgba(0, 255, 102, 0.1);
        }
        .text-neon {
            color: var(--neon-green);
        }
        .bg-neon {
            background-color: var(--neon-green);
        }
        .border-neon {
            border-color: var(--neon-green);
        }
        .nav-item.active {
            color: var(--neon-green);
        }
        .nav-item.active i {
            transform: translateY(-2px);
            text-shadow: 0 0 15px var(--neon-green);
        }
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
        /* Hide scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Loader */
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid var(--neon-green);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn-neon {
            background-color: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-neon:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px var(--accent-glow);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Auth Screen -->
    <div id="auth-screen" class="fixed inset-0 z-[100] bg-[#050505] flex flex-col items-center justify-center p-6 text-center hidden">
        <div class="mb-10">
            <div class="w-24 h-24 bg-neon rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(0,255,102,0.4)]">
                <i class="fab fa-github text-5xl text-black"></i>
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">OneCore <span class="text-neon">GitHub</span></h1>
            <p class="text-muted-purple mt-2 text-sm font-bold uppercase tracking-widest opacity-60">File Manager Pro</p>
        </div>

        <div id="login-initial" class="w-full max-w-xs space-y-4">
            <button id="btn-login" class="w-full btn-neon font-black py-4 px-6 rounded-2xl transition-all flex items-center justify-center gap-3 uppercase tracking-widest text-sm">
                <i class="fas fa-bolt"></i>
                One-Click Login
            </button>
        </div>

        <div id="login-device" class="w-full max-w-xs hidden">
            <div class="glass-card p-8 rounded-3xl mb-6 border-neon/30">
                <p class="text-xs text-neon font-black uppercase tracking-widest mb-4">Verification Code</p>
                <div id="user-code" class="text-4xl font-mono font-black text-white tracking-widest mb-6">---- ----</div>
                <button id="btn-open-github" class="w-full bg-white text-black font-black py-3 px-4 rounded-xl text-xs uppercase tracking-widest mb-3">
                    Open GitHub
                </button>
                <p class="text-[10px] text-white/40 font-bold uppercase tracking-tighter">Waiting for you to enter code...</p>
            </div>
            <div class="loader mx-auto"></div>
        </div>
    </div>

    <!-- Main App Container -->
    <main id="app-container" class="flex-1 overflow-y-auto no-scrollbar pb-24">
        <!-- Header -->
        <header class="sticky top-0 z-50 bg-[#050505]/80 backdrop-blur-md border-b border-white/5 p-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div id="user-avatar" class="w-9 h-9 rounded-xl bg-neon/10 border border-neon/20 overflow-hidden">
                    <img src="" alt="" class="w-full h-full object-cover hidden">
                </div>
                <h2 id="view-title" class="text-lg font-black text-white uppercase tracking-tight">Home</h2>
            </div>
            <div class="flex items-center gap-2">
                <button id="btn-refresh" class="p-2 text-white/40 hover:text-neon transition-colors"><i class="fas fa-sync-alt"></i></button>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content" class="p-4 space-y-4">
            <!-- Content will be injected here -->
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 glass-card border-t border-purple-900/30 safe-bottom z-50">
        <div class="flex items-center justify-around p-2">
            <button data-tab="home" class="nav-item flex flex-col items-center gap-1 p-2 transition-all active">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Home</span>
            </button>
            <button data-tab="repos" class="nav-item flex flex-col items-center gap-1 p-2 transition-all">
                <i class="fas fa-book text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Repos</span>
            </button>
            <button data-tab="upload" class="nav-item flex flex-col items-center gap-1 p-2 transition-all">
                <i class="fas fa-cloud-upload-alt text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Upload</span>
            </button>
            <button data-tab="settings" class="nav-item flex flex-col items-center gap-1 p-2 transition-all">
                <i class="fas fa-cog text-xl"></i>
                <span class="text-[10px] font-bold uppercase tracking-tighter">Settings</span>
            </button>
        </div>
    </nav>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-purple-600 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl opacity-0 transition-all pointer-events-none z-[200]">
        Notification message
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
